<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>Geometry Dash: The End Update</title>
	<link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
	<link rel="stylesheet" href="./assets/style.css">

	<!-- - Embeds - -->
	<!-- Open Graph / Facebook -->
	<meta property="og:title" content="Web Dash"/>
	<meta property="og:description" content="A mod of geometrydash.com!"/>
	<meta property="og:image" content="https://github.io"/>
	<meta property="og:url" content="https://github.io"/>
    
	<!-- Twitter -->
	<meta name="twitter:card" content="summary_large_image"/>
	<meta name="twitter:title" content="Web Dash"/>
	<meta name="twitter:description" content="A mod of geometrydash.com!"/>
	<meta name="twitter:image" content="https://github.io"/>
	
	<!-- Libraries and assets -->
	<script src="./assets/scripts/allObjects.js"></script>
	<script src="./assets/scripts/allLevels.js"></script>
	<script src="./assets/scripts/phaser.min.js"></script>
	<script src="./assets/scripts/pako.min.js"></script>
	
	<!-- ACTUAL GAME CODE -->
	<script type="module" crossorigin src="./assets/scripts/index-game.js"></script>

	<script>
		// Handle screen scaling and resizing automatically
		window.addEventListener('DOMContentLoaded', () => {
			new ResizeObserver(() => {
				window.dispatchEvent(new Event('resize'));
			}).observe(document.documentElement);
		});
    
		// Prevent the standard right-click context menu inside the game canvas
		document.oncontextmenu = (event) => {
			event.preventDefault();
		};
	</script>
</head>

<body>
	<!-- Phaser game hooks canvas elements here automatically upon load -->
</body>

</html>
